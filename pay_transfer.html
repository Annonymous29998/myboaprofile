<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data:; font-src 'self' https://cdnjs.cloudflare.com data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <script src="security.js"></script>
    <title>Bank of America - Pay & Transfer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mobile-container dashboard-mode">
        <!-- Top Navigation -->
        <header class="top-nav">
            <div class="nav-left">
                <div class="nav-item" style="margin-left: 0;">
                    <i class="fas fa-bars nav-icon"></i>
                    <span class="nav-text">Menu</span>
                </div>
            </div>
            <div class="nav-right">
                <div class="nav-item">
                    <i class="far fa-envelope nav-icon"></i>
                    <span class="nav-text">Inbox</span>
                </div>
                <div class="nav-item">
                    <i class="fas fa-shopping-cart nav-icon"></i>
                    <span class="nav-text">Products</span>
                </div>
                <div class="nav-item" id="logout-btn">
                    <i class="fas fa-sign-out-alt nav-icon"></i>
                    <span class="nav-text">Log Out</span>
                </div>
            </div>
        </header>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab" onclick="window.location.href='dashboard.html'">Accounts</div>
            <div class="tab active">Pay & Transfer</div>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <h1 class="page-title">Pay & Transfer</h1>
            
            <!-- Pay Options Grid -->
            <div class="pay-options-grid">
                <div class="pay-option-card" id="zelleOption">
                    <div class="pay-icon-container zelle-bg">
                        <svg viewBox="0 0 100 40" style="width: 50px; height: auto; fill: white;">
                            <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="28" fill="white" letter-spacing="-1">Zelle</text>
                            <line x1="50" y1="5" x2="50" y2="35" stroke="white" stroke-width="2" transform="rotate(15 50 20)" style="opacity: 0.3;" />
                        </svg>
                    </div>
                    <span class="pay-option-text">Send money with Zelle®</span>
                </div>
                <div class="pay-option-card" id="transferOption">
                    <div class="pay-icon-container blue-bg">
                        <i class="fas fa-exchange-alt"></i>
                    </div>
                    <span class="pay-option-text">Transfer between accounts</span>
                </div>
                <div class="pay-option-card" id="billPayOption">
                    <div class="pay-icon-container red-bg">
                        <i class="fas fa-file-invoice-dollar"></i>
                    </div>
                    <span class="pay-option-text">Bill Pay</span>
                </div>
                <div class="pay-option-card" id="wireOption">
                    <div class="pay-icon-container gray-bg">
                        <i class="fas fa-globe"></i>
                    </div>
                    <span class="pay-option-text">Wire Money</span>
                </div>
            </div>

            <!-- Recent Transactions Section -->
            <div class="recent-transactions-section">
                <h3>Recent Transactions</h3>
                <div class="transaction-list" id="transaction-list-container">
                    <!-- Transactions will be populated by JavaScript -->
                </div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item" id="accounts-tab">
                <div class="icon-circle">
                    <i class="fas fa-dollar-sign"></i>
                </div>
                <span>Accounts</span>
            </div>
            <div class="nav-item active">
                <div class="icon-circle">
                    <i class="fas fa-exchange-alt"></i>
                </div>
                <span>Pay & Transfer</span>
            </div>
            <div class="nav-item" id="deposit-checks-tab">
                <div class="icon-circle">
                    <i class="fas fa-camera"></i>
                </div>
                <span>Deposit Checks</span>
            </div>
            <div class="nav-item" id="invest-tab">
                <div class="icon-circle">
                    <i class="fas fa-chart-line"></i>
                </div>
                <span>Invest</span>
            </div>
        </nav>
    </div>

    <!-- TRANSFER ERROR MODAL -->
    <div id="transferErrorModal" class="modal-overlay">
        <div class="transfer-error-modal">
            <div class="transfer-error-title">Error</div>
            <div class="transfer-error-message">We're sorry, we weren't able to complete your request. Please try again.</div>
            <button id="retryTransferBtn" class="transfer-error-btn">Retry</button>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        BoAAuth.requireAuth();

        // ========================
        // LOGOUT & NAVIGATION
        // ========================
        document.getElementById('logout-btn').addEventListener('click', function() {
            BoAAuth.logout();
            window.location.href = 'index.html';
        });
        
        document.getElementById('accounts-tab').addEventListener('click', function() {
            window.location.href = 'dashboard.html';
        });

        document.getElementById('deposit-checks-tab').addEventListener('click', function() {
            window.location.href = 'deposit_checks.html';
        });

        document.getElementById('invest-tab').addEventListener('click', function() {
            window.location.href = 'invest.html';
        });

        // ========================
        // TRANSACTION GENERATION (ledger: Mar–Jun 2026)
        // ========================
        function generateTransactions() {
            const container = document.getElementById('transaction-list-container');
            const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];

            const history = [
                { date: new Date(2026, 2, 3), desc: "Incoming Wire Transfer", meta: ["Manulife Investment wire transfer", "Hancock Forest Management", "Ref: 6a3ee9dc68982I1cTkINfUYpt76o"], amount: 18450000.00, type: "positive" },
                { date: new Date(2026, 2, 6), desc: "Wire Transfer – Deloitte Payroll", sub: "Direct Deposit", amount: 4556.00, type: "positive" },
                { date: new Date(2026, 2, 7), desc: "POS Purchase – Walmart", sub: "POS Purchase", amount: 96.22, type: "negative" },
                { date: new Date(2026, 2, 10), desc: "ATM Withdrawal", sub: "ATM", amount: 400.00, type: "negative" },
                { date: new Date(2026, 2, 14), desc: "Online Purchase – Amazon", sub: "Online Purchase", amount: 118.75, type: "negative" },
                { date: new Date(2026, 2, 18), desc: "Fuel Purchase", sub: "Gas & Fuel", amount: 72.55, type: "negative" },
                { date: new Date(2026, 2, 21), desc: "Utility Bill Payment", sub: "Bill Pay", amount: 181.25, type: "negative" },
                { date: new Date(2026, 2, 25), desc: "Restaurant Purchase", sub: "Dining", amount: 95.00, type: "negative" },
                { date: new Date(2026, 2, 28), desc: "Rent Payment", sub: "Rent", amount: 3650.00, type: "negative" },

                { date: new Date(2026, 3, 2), desc: "Incoming Wire Transfer", meta: ["Manulife Investment wire transfer", "Hancock Forest Management", "Ref: 7f8bc04de79a31K2bUjHMfVps87n"], amount: 18450000.00, type: "positive" },
                { date: new Date(2026, 3, 4), desc: "Wire Transfer – Deloitte Payroll", sub: "Direct Deposit", amount: 4420.00, type: "positive" },
                { date: new Date(2026, 3, 6), desc: "POS Purchase – Costco", sub: "POS Purchase", amount: 210.14, type: "negative" },
                { date: new Date(2026, 3, 9), desc: "ATM Withdrawal", sub: "ATM", amount: 500.00, type: "negative" },
                { date: new Date(2026, 3, 12), desc: "Online Purchase – eBay", sub: "Online Purchase", amount: 88.45, type: "negative" },
                { date: new Date(2026, 3, 17), desc: "Fuel Purchase", sub: "Gas & Fuel", amount: 76.32, type: "negative" },
                { date: new Date(2026, 3, 21), desc: "Utility Bill Payment", sub: "Bill Pay", amount: 146.22, type: "negative" },
                { date: new Date(2026, 3, 24), desc: "Grocery Purchase", sub: "Groceries", amount: 84.19, type: "negative" },
                { date: new Date(2026, 3, 28), desc: "Rent Payment", sub: "Rent", amount: 3350.00, type: "negative" },

                { date: new Date(2026, 4, 1), desc: "Incoming Wire Transfer", meta: ["Manulife Investment wire transfer", "Hancock Forest Management", "Ref: 9d2ef15ac8b42M3cVkINwXqt98m"], amount: 18450000.00, type: "positive" },
                { date: new Date(2026, 4, 2), desc: "Wire Transfer – Deloitte Payroll", sub: "Direct Deposit", amount: 4500.00, type: "positive" },
                { date: new Date(2026, 4, 5), desc: "Grocery Purchase", sub: "Groceries", amount: 124.85, type: "negative" },
                { date: new Date(2026, 4, 8), desc: "ATM Withdrawal", sub: "ATM", amount: 350.00, type: "negative" },
                { date: new Date(2026, 4, 12), desc: "Online Purchase – Amazon", sub: "Online Purchase", amount: 89.50, type: "negative" },
                { date: new Date(2026, 4, 16), desc: "Fuel Purchase", sub: "Gas & Fuel", amount: 70.15, type: "negative" },
                { date: new Date(2026, 4, 20), desc: "Utility Bill Payment", sub: "Bill Pay", amount: 165.50, type: "negative" },
                { date: new Date(2026, 4, 23), desc: "Restaurant Purchase", sub: "Dining", amount: 78.45, type: "negative" },
                { date: new Date(2026, 4, 29), desc: "Rent Payment", sub: "Rent", amount: 3700.00, type: "negative" },

                { date: new Date(2026, 5, 3), desc: "Incoming Wire Transfer", meta: ["Manulife Investment wire transfer", "Hancock Forest Management", "Ref: 4e1cd26bd9c53N4dWlJOxYru09l"], amount: 18450000.00, type: "positive" },
                { date: new Date(2026, 5, 7), desc: "Wire Transfer – Deloitte Payroll", sub: "Direct Deposit", amount: 4566.00, type: "positive" },
                { date: new Date(2026, 5, 10), desc: "POS Purchase – Walmart", sub: "POS Purchase", amount: 96.22, type: "negative" },
                { date: new Date(2026, 5, 14), desc: "ATM Withdrawal", sub: "ATM", amount: 400.00, type: "negative" },
                { date: new Date(2026, 5, 17), desc: "Online Purchase – Amazon", sub: "Online Purchase", amount: 118.75, type: "negative" },
                { date: new Date(2026, 5, 21), desc: "Fuel Purchase", sub: "Gas & Fuel", amount: 72.55, type: "negative" },
                { date: new Date(2026, 5, 25), desc: "Utility Bill Payment", sub: "Bill Pay", amount: 181.25, type: "negative" },
                { date: new Date(2026, 5, 28), desc: "Restaurant Purchase", sub: "Dining", amount: 95.00, type: "negative" }
            ];

            const transactions = history
                .sort((a, b) => b.date - a.date)
                .map((tx) => ({
                    month: months[tx.date.getMonth()],
                    day: tx.date.getDate(),
                    year: tx.date.getFullYear(),
                    desc: tx.desc,
                    sub: tx.sub || null,
                    meta: tx.meta || null,
                    amount: tx.amount,
                    type: tx.type
                }));

            const fragment = document.createDocumentFragment();
            transactions.forEach(tx => {
                const item = document.createElement('div');
                item.className = 'transaction-item';
                const formattedAmount = new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: 'USD'
                }).format(Math.abs(tx.amount));
                const sign = tx.type === 'positive' ? '+' : '-';
                const detailsHtml = tx.meta
                    ? `<div class="transaction-meta">${tx.meta.map((line) => {
                        if (line.startsWith('Ref: ')) {
                            const refCode = line.slice(5);
                            return `<span class="transaction-meta-line transaction-ref"><span class="transaction-ref-label">Ref:</span><span class="transaction-ref-code">${refCode}</span></span>`;
                        }
                        return `<span class="transaction-meta-line">${line}</span>`;
                    }).join('')}</div>`
                    : `<p class="transaction-sub">${tx.sub}</p>`;

                item.innerHTML = `
                    <div class="transaction-date">
                        <span class="month">${tx.month}</span>
                        <span class="day">${tx.day}</span>
                        <span class="year">${tx.year}</span>
                    </div>
                    <div class="transaction-details">
                        <p class="transaction-desc">${tx.desc}</p>
                        ${detailsHtml}
                    </div>
                    <div class="transaction-amount ${tx.type}">${sign}${formattedAmount}</div>
                `;
                fragment.appendChild(item);
            });
            container.appendChild(fragment);
        }

        // ========================
        // TRANSFER ERROR MODAL
        // ========================
        const transferErrorModal = document.getElementById('transferErrorModal');
        const retryTransferBtn = document.getElementById('retryTransferBtn');
        
        // Get all pay option cards
        const zelleOption = document.getElementById('zelleOption');
        const transferOption = document.getElementById('transferOption');
        const billPayOption = document.getElementById('billPayOption');
        const wireOption = document.getElementById('wireOption');
        
        function showTransferErrorModal() {
            transferErrorModal.style.display = 'flex';
        }

        function closeTransferErrorModal() {
            transferErrorModal.style.display = 'none';
        }

        [zelleOption, transferOption, billPayOption, wireOption].forEach(function(option) {
            if (option) {
                option.addEventListener('click', function(e) {
                    e.preventDefault();
                    showTransferErrorModal();
                });
            }
        });

        if (retryTransferBtn) {
            retryTransferBtn.addEventListener('click', function() {
                closeTransferErrorModal();
            });
        }

        transferErrorModal.addEventListener('click', function(e) {
            if (e.target === transferErrorModal) {
                closeTransferErrorModal();
            }
        });

        // Initialize on page load
        window.onload = function() {
            generateTransactions();
            if (transferErrorModal) {
                transferErrorModal.style.display = 'none';
            }
        };
    </script>
</body>
</html>
